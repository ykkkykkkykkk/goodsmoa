services:
  - type: web
    name: goodsmoa
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build && cd server && npm ci --omit=dev
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

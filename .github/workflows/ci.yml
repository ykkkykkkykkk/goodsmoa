name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # 프론트엔드 빌드
      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # 서버 테스트
      - name: Install server dependencies
        run: cd server && npm ci

      - name: Run server tests
        run: cd server && npm test

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t goodsmoa:${{ github.sha }} .

      - name: Test Docker health check
        run: |
          docker run -d --name test-app \
            -e ADMIN_PASSWORD=ci_test_pass \
            -e JWT_SECRET=ci_test_jwt_secret_32chars_long \
            -e ALLOWED_ORIGIN=http://localhost \
            -e NODE_ENV=production \
            -p 3001:3001 \
            goodsmoa:${{ github.sha }}
          sleep 5
          curl -f http://localhost:3001/api/health || (docker logs test-app && exit 1)
          docker stop test-app
